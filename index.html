<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuromarketing Tutor — Fontys University</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --purple-dark: #3C3489;
    --bg: #F7F6FD;
    --surface: #FFFFFF;
    --surface2: #F2F1FB;
    --border: rgba(83,74,183,0.15);
    --border2: rgba(83,74,183,0.28);
    --text: #1a1730;
    --text2: #5a5580;
    --text3: #9691b8;
    --green-bg: #EAF3DE; --green-border: #639922; --green-text: #27500A;
    --red-bg: #FCEBEB; --red-border: #E24B4A; --red-text: #501313;
    --amber-bg: #FAEEDA; --amber-border: #BA7517; --amber-text: #633806;
    --radius: 10px; --radius-lg: 14px;
    --shadow: 0 2px 12px rgba(83,74,183,0.08);
    --shadow-md: 0 4px 24px rgba(83,74,183,0.13);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .app-header {
    background: var(--purple-dark);
    color: white;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 16px rgba(60,52,137,0.25);
    position: sticky; top: 0; z-index: 100;
  }
  .app-header .logo {
    width: 42px; height: 42px; border-radius: 10px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .app-header h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; letter-spacing: 0.2px; }
  .app-header p { font-size: 12px; opacity: 0.7; margin-top: 1px; }
  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.18);
    font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* LAYOUT */
  .app-body {
    display: flex;
    flex: 1;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    display: flex;
    flex-direction: column;
  }
  .sidebar-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text3);
    padding: 0 1.25rem; margin-bottom: 8px;
  }
  .lec-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 1.25rem; cursor: pointer;
    border: none; background: none; text-align: left; width: 100%;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .lec-btn:hover { background: var(--purple-light); }
  .lec-btn.active { background: var(--purple-light); border-left-color: var(--purple); }
  .lec-btn .lec-num {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    background: var(--purple-light); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--purple);
  }
  .lec-btn.active .lec-num { background: var(--purple); color: white; border-color: var(--purple); }
  .lec-btn .lec-info { flex: 1; min-width: 0; }
  .lec-btn .lec-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .lec-btn .lec-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .sidebar-sep { border: none; border-top: 1px solid var(--border); margin: 1rem 1.25rem; }
  .sidebar-action {
    padding: 10px 1.25rem; cursor: pointer;
    border: none; background: none; text-align: left; width: 100%;
    font-size: 13px; color: var(--purple); font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-action:hover { background: var(--purple-light); }

  /* MAIN */
  .main {
    flex: 1;
    padding: 2rem;
    overflow-y: auto;
    max-width: 860px;
  }

  /* LECTURE HEADER */
  .lec-header {
    display: flex; align-items: flex-start; gap: 14px;
    margin-bottom: 1.5rem;
    padding: 1.25rem 1.5rem;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .lec-emoji { font-size: 36px; line-height: 1; }
  .lec-header h2 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; }
  .lec-header p { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .lec-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag {
    font-size: 11px; font-weight: 500; padding: 3px 10px;
    border-radius: 99px; background: var(--purple-light);
    color: var(--purple); border: 1px solid var(--border);
  }

  /* TABS */
  .tabs {
    display: flex; gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 4px;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
  }
  .tab-btn {
    flex: 1; padding: 9px 6px;
    font-size: 13px; font-weight: 500;
    border: none; background: none; cursor: pointer;
    color: var(--text2); border-radius: 8px;
    transition: all 0.15s;
  }
  .tab-btn:hover:not(.active) { background: var(--purple-light); color: var(--purple); }
  .tab-btn.active { background: var(--purple); color: white; box-shadow: 0 2px 8px rgba(83,74,183,0.3); }

  /* PANEL */
  .panel { display: none; }
  .panel.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .card h3 {
    font-size: 14px; font-weight: 600; color: var(--purple);
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 1rem; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .card h3 .icon { font-size: 18px; }

  /* SUMMARY LIST */
  .summary-list { list-style: none; }
  .summary-list li {
    padding: 7px 0; font-size: 14px; color: var(--text);
    border-bottom: 1px solid var(--border); line-height: 1.6;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .summary-list li:last-child { border-bottom: none; }
  .summary-list li::before { content: "→"; color: var(--purple-mid); font-weight: 600; flex-shrink: 0; margin-top: 1px; }

  /* TERMS GRID */
  .terms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .term-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .term-card .term-name {
    font-size: 12px; font-weight: 600; color: var(--purple);
    text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px;
  }
  .term-card .term-def { font-size: 13px; color: var(--text2); line-height: 1.5; }

  /* FLASHCARDS */
  .fc-progress {
    display: flex; align-items: center; gap: 12px; margin-bottom: 1rem;
  }
  .fc-progress .fc-count { font-size: 24px; font-weight: 600; color: var(--purple); min-width: 60px; }
  .fc-progress .fc-label { font-size: 13px; color: var(--text2); }
  .fc-dots { display: flex; gap: 4px; flex-wrap: wrap; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border2);
    transition: all 0.2s;
  }
  .dot.current { background: var(--purple); border-color: var(--purple); transform: scale(1.2); }
  .dot.seen { background: var(--purple-mid); border-color: var(--purple-mid); }

  .flashcard {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    min-height: 200px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1rem;
    box-shadow: var(--shadow-md);
  }
  .flashcard:hover { border-color: var(--purple-mid); transform: translateY(-2px); box-shadow: 0 6px 28px rgba(83,74,183,0.15); }
  .flashcard.revealed { border-color: var(--purple); background: var(--purple-light); }
  .fc-mode-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3); margin-bottom: 14px;
  }
  .flashcard.revealed .fc-mode-label { color: var(--purple); }
  .fc-question { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.5; }
  .flashcard.revealed .fc-question { color: var(--purple); font-size: 14px; margin-bottom: 12px; }
  .fc-answer {
    font-size: 14px; color: var(--text2); line-height: 1.6;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border2); display: none;
  }
  .flashcard.revealed .fc-answer { display: block; color: var(--text); }
  .fc-hint { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 1rem; }
  .fc-nav { display: flex; gap: 8px; justify-content: center; align-items: center; }
  .btn { 
    padding: 9px 20px; font-size: 13px; font-weight: 500;
    border-radius: var(--radius); cursor: pointer;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text); transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .btn:hover { background: var(--purple-light); border-color: var(--purple-mid); color: var(--purple); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: var(--purple); color: white; border-color: var(--purple);
  }
  .btn-primary:hover { background: var(--purple-dark); border-color: var(--purple-dark); color: white; }

  /* QUIZ */
  .quiz-question { font-size: 16px; font-weight: 500; line-height: 1.6; margin-bottom: 1.25rem; color: var(--text); }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .quiz-opt {
    padding: 12px 16px; font-size: 14px; border-radius: var(--radius);
    border: 1px solid var(--border2); background: var(--surface);
    cursor: pointer; text-align: left; transition: all 0.15s;
    color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.5;
  }
  .quiz-opt:hover:not(:disabled) { background: var(--purple-light); border-color: var(--purple-mid); }
  .quiz-opt.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .quiz-opt.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: 13px; line-height: 1.6; margin-bottom: 1rem;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green-text); }
  .quiz-feedback.no { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-text); }
  .quiz-complete {
    text-align: center; padding: 2rem;
    background: var(--purple-light); border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }
  .quiz-complete .score-big { font-family: 'DM Serif Display', serif; font-size: 54px; color: var(--purple); }
  .quiz-complete .score-label { font-size: 16px; color: var(--text2); margin-top: 4px; }
  .quiz-complete .score-msg { font-size: 14px; color: var(--text); margin-top: 12px; }

  /* EXAM TIPS */
  .tip-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    font-size: 14px; line-height: 1.6; color: var(--text);
  }
  .tip-item:last-child { border-bottom: none; }
  .priority-badge {
    font-size: 10px; font-weight: 600; padding: 3px 8px;
    border-radius: 99px; flex-shrink: 0; margin-top: 2px;
  }
  .priority-high { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); }
  .priority-med { background: var(--amber-bg); color: var(--amber-text); border: 1px solid var(--amber-border); }

  /* AI BUTTON */
  .ai-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
    color: white; border: none; border-radius: var(--radius);
    padding: 11px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; width: 100%; margin-top: 1rem;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 2px 10px rgba(83,74,183,0.3);
    transition: all 0.15s;
  }
  .ai-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(83,74,183,0.4); }
  .ai-btn .ai-icon { font-size: 16px; }

  /* MOCK EXAM PANEL */
  .mock-intro {
    text-align: center; padding: 2rem;
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .mock-intro h3 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; margin-bottom: 8px; }
  .mock-intro p { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }
  .lec-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .lec-check {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text);
  }
  .lec-check input { accent-color: var(--purple); cursor: pointer; }
  .lec-check:hover { background: var(--purple-light); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* MOBILE BOTTOM NAV */
  .mobile-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 6px 4px env(safe-area-inset-bottom, 6px);
    box-shadow: 0 -2px 12px rgba(83,74,183,0.1);
  }
  .mobile-nav-inner { display: flex; align-items: center; }
  .mob-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 6px 2px;
    border: none; background: none; cursor: pointer;
    border-radius: 8px; transition: background 0.15s;
  }
  .mob-btn:hover { background: var(--purple-light); }
  .mob-btn.active .mob-icon { background: var(--purple); color: white; }
  .mob-btn.active .mob-label { color: var(--purple); font-weight: 600; }
  .mob-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: var(--surface2);
    transition: background 0.15s;
  }
  .mob-label { font-size: 9px; color: var(--text3); font-weight: 500; letter-spacing: 0.2px; }

  /* LECTURE DRAWER (mobile) */
  .mob-drawer-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(26,23,48,0.5); backdrop-filter: blur(2px);
  }
  .mob-drawer-overlay.open { display: block; }
  .mob-drawer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    max-height: 80vh; overflow-y: auto;
  }
  .mob-drawer.open { transform: translateY(0); }
  .mob-drawer-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border2); margin: 12px auto 4px;
  }
  .mob-drawer-title {
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text3);
    padding: 8px 16px 8px;
  }
  .mob-lec-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; border-bottom: 1px solid var(--border);
  }
  .mob-lec-item:last-child { border-bottom: none; }
  .mob-lec-item:active { background: var(--purple-light); }
  .mob-lec-item.active { background: var(--purple-light); }
  .mob-lec-item .mob-lec-num {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--purple);
  }
  .mob-lec-item.active .mob-lec-num { background: var(--purple); color: white; }
  .mob-lec-item .mob-lec-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .mob-lec-item .mob-lec-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .main { padding: 1rem 0.875rem; padding-bottom: 90px; }
    .terms-grid { grid-template-columns: 1fr; }
    .lec-select-grid { grid-template-columns: 1fr 1fr; }
    .mobile-nav { display: block; }
    .app-header { padding: 0.875rem 1rem; }
    .app-header h1 { font-size: 17px; }
    .app-header p { font-size: 11px; }
    .tabs { flex-wrap: nowrap; overflow-x: auto; gap: 2px; padding: 3px; }
    .tab-btn { font-size: 12px; padding: 8px 4px; white-space: nowrap; min-width: 0; }
    .flashcard { padding: 1.75rem 1.25rem; min-height: 170px; }
    .lec-header { padding: 1rem; }
    .lec-header h2 { font-size: 18px; }
    .card { padding: 1rem; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">🧠</div>
  <div>
    <h1>Neuromarketing Tutor</h1>
    <p>Fontys University — Exam Preparation</p>
  </div>
  <div class="header-badge">6 Lectures</div>
</header>

<div class="app-body">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-label">Lectures</div>
    <button class="lec-btn active" onclick="selectLec(1,this)">
      <div class="lec-num">1</div>
      <div class="lec-info">
        <div class="lec-title">Introduction</div>
        <div class="lec-sub">Neuromarketing basics</div>
      </div>
    </button>
    <button class="lec-btn" onclick="selectLec(2,this)">
      <div class="lec-num">2</div>
      <div class="lec-info">
        <div class="lec-title">Motivation & Involvement</div>
        <div class="lec-sub">Maslow · ELM</div>
      </div>
    </button>
    <button class="lec-btn" onclick="selectLec(3,this)">
      <div class="lec-num">3</div>
      <div class="lec-info">
        <div class="lec-title">Perception</div>
        <div class="lec-sub">JND · Gestalt · Sensory</div>
      </div>
    </button>
    <button class="lec-btn" onclick="selectLec(4,this)">
      <div class="lec-num">4</div>
      <div class="lec-info">
        <div class="lec-title">Memory & Learning</div>
        <div class="lec-sub">Conditioning · Schemas</div>
      </div>
    </button>
    <button class="lec-btn" onclick="selectLec(5,this)">
      <div class="lec-num">5</div>
      <div class="lec-info">
        <div class="lec-title">Attitudes</div>
        <div class="lec-sub">ABC · Dissonance · Katz</div>
      </div>
    </button>
    <button class="lec-btn" onclick="selectLec(6,this)">
      <div class="lec-num">6</div>
      <div class="lec-info">
        <div class="lec-title">Persuasion</div>
        <div class="lec-sub">ELM · Cialdini</div>
      </div>
    </button>
    <hr class="sidebar-sep">
    <button class="sidebar-action" onclick="selectLec('mock', null)">
      📝 Full Mock Exam
    </button>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content">
    <!-- Rendered by JS -->
  </main>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <button class="mob-btn active" id="mob-btn-lec" onclick="openDrawer()">
      <div class="mob-icon">📚</div>
      <div class="mob-label">Lectures</div>
    </button>
    <button class="mob-btn" id="mob-btn-sum" onclick="mobTab('summary')">
      <div class="mob-icon">📋</div>
      <div class="mob-label">Summary</div>
    </button>
    <button class="mob-btn" id="mob-btn-fc" onclick="mobTab('flashcards')">
      <div class="mob-icon">🃏</div>
      <div class="mob-label">Cards</div>

let currentLec = 1;
let fcIndex = 0;
let fcRevealed = false;
let quizIndex = 0;
let quizAnswered = false;
let quizScores = [];
let selectedOpt = -1;
let currentTab = 'summary';

function selectLec(n, btn) {
  document.querySelectorAll('.lec-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentLec = n;
  fcIndex = 0; fcRevealed = false;
  quizIndex = 0; quizAnswered = false; quizScores = []; selectedOpt = -1;
  currentTab = 'summary';
  renderMain();
}

function renderMain() {
  if (currentLec === 'mock') { renderMock(); return; }
  const d = LECTURES[currentLec];
  let html = `
  <div class="lec-header">
    <div class="lec-emoji">${d.emoji}</div>
    <div>
      <h2>Lecture ${currentLec}: ${d.title}</h2>
      <p>${d.subtitle}</p>
      <div class="lec-tags">${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn${currentTab==='summary'?' active':''}" onclick="switchTab('summary')">📋 Summary</button>
    <button class="tab-btn${currentTab==='terms'?' active':''}" onclick="switchTab('terms')">📖 Terms</button>
    <button class="tab-btn${currentTab==='flashcards'?' active':''}" onclick="switchTab('flashcards')">🃏 Flashcards</button>
    <button class="tab-btn${currentTab==='quiz'?' active':''}" onclick="switchTab('quiz')">🧪 Quiz</button>
    <button class="tab-btn${currentTab==='exam'?' active':''}" onclick="switchTab('exam')">⭐ Exam Tips</button>
  </div>
  <div id="tab-content"></div>`;
  document.getElementById('main-content').innerHTML = html;
  renderTab();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const idx = ['summary','terms','flashcards','quiz','exam'].indexOf(tab);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  renderTab();
}

function renderTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  if (currentTab === 'summary') el.innerHTML = renderSummary();
  else if (currentTab === 'terms') el.innerHTML = renderTerms();
  else if (currentTab === 'flashcards') el.innerHTML = renderFlashcards();
  else if (currentTab === 'quiz') el.innerHTML = renderQuiz();
  else if (currentTab === 'exam') el.innerHTML = renderExam();
}

function renderSummary() {
  const d = LECTURES[currentLec];
  return `<div class="card">
    <h3><span class="icon">📋</span> Key Points — Lecture ${currentLec}: ${d.title}</h3>
    <ul class="summary-list">${d.summary.map(s => `<li>${s}</li>`).join('')}</ul>
  </div>`;
}

function renderTerms() {
  const d = LECTURES[currentLec];
  return `<div class="card">
    <h3><span class="icon">📖</span> Key Terms & Definitions</h3>
    <div class="terms-grid">${d.terms.map(t => `
      <div class="term-card">
        <div class="term-name">${t.t}</div>
        <div class="term-def">${t.d}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderFlashcards() {
  const d = LECTURES[currentLec];
  const cards = d.flashcards;
  const card = cards[fcIndex];
  const dots = cards.map((_, i) => `<div class="dot${i === fcIndex ? ' current' : i < fcIndex ? ' seen' : ''}"></div>`).join('');
  return `
  <div class="card">
    <h3><span class="icon">🃏</span> Flashcards (${fcIndex+1} of ${cards.length})</h3>
    <div class="fc-progress">
      <div><div class="fc-count">${fcIndex+1}/${cards.length}</div><div class="fc-label">card</div></div>
      <div class="fc-dots">${dots}</div>
    </div>
    <div class="flashcard${fcRevealed?' revealed':''}" onclick="revealCard()">
      <div class="fc-mode-label">${fcRevealed ? '✓ Answer' : '🤔 Question — click to reveal'}</div>
      <div class="fc-question">${card.q}</div>
      <div class="fc-answer">${card.a}</div>
    </div>
    <p class="fc-hint">${fcRevealed ? 'Click Next to continue' : 'Click the card to reveal the answer'}</p>
    <div class="fc-nav">
      <button class="btn" onclick="prevCard()" ${fcIndex===0?'disabled':''}>← Prev</button>
      <button class="btn btn-primary" onclick="nextCard()">${fcIndex===cards.length-1?'Restart ↺':'Next →'}</button>
    </div>
  </div>`;
}

function revealCard() { fcRevealed = true; renderTab(); }
function nextCard() {
  const cards = LECTURES[currentLec].flashcards;
  fcIndex = fcIndex >= cards.length - 1 ? 0 : fcIndex + 1;
  fcRevealed = false; renderTab();
}
function prevCard() {
  if (fcIndex > 0) { fcIndex--; fcRevealed = false; renderTab(); }
}

function renderQuiz() {
  const d = LECTURES[currentLec];
  const qs = d.quiz;
  const total = qs.length;
  const correct = quizScores.filter(Boolean).length;
  const dots = qs.map((_, i) => {
    let cls = i < quizScores.length ? (quizScores[i] ? 'done-ok' : 'done-no') : (i === quizIndex ? 'current' : '');
    return `<div class="dot ${cls}" style="${quizScores[i]===true?'background:#639922;border-color:#639922':quizScores[i]===false?'background:#E24B4A;border-color:#E24B4A':''}"></div>`;
  }).join('');

  if (quizIndex >= total) {
    const pct = Math.round(correct / total * 100);
    const msg = pct >= 80 ? '🎉 Excellent! You know this lecture very well.' : pct >= 60 ? '👍 Good work! Review the questions you missed.' : '📚 Keep studying — go back to the flashcards for the tricky topics.';
    return `<div class="card">
      <h3><span class="icon">🧪</span> Quiz Complete!</h3>
      <div class="quiz-complete">
        <div class="score-big">${pct}%</div>
        <div class="score-label">${correct} out of ${total} correct</div>
        <div class="score-msg">${msg}</div>
        <div style="margin-top:1.5rem;display:flex;gap:8px;justify-content:center">
          <button class="btn" onclick="restartQuiz()">↺ Restart Quiz</button>
        </div>
      </div>
    </div>`;
  }

  const q = qs[quizIndex];
  let optsHtml = q.opts.map((opt, i) => {
    let cls = '';
    if (quizAnswered) {
      if (i === q.ans) cls = 'correct';
      else if (i === selectedOpt && i !== q.ans) cls = 'wrong';
    }
    return `<button class="quiz-opt ${cls}" onclick="answerQuiz(${i})" ${quizAnswered?'disabled':''}><strong>${String.fromCharCode(65+i)}.</strong> ${opt}</button>`;
  }).join('');

  let feedbackHtml = '';
  if (quizAnswered) {
    const ok = selectedOpt === q.ans;
    feedbackHtml = `<div class="quiz-feedback show ${ok?'ok':'no'}">${ok?'✓ Correct! ':'✗ Incorrect. '}<strong>${q.exp}</strong></div>`;
    feedbackHtml += `<button class="btn btn-primary" onclick="nextQuestion()">Next →</button>`;
  }

  return `<div class="card">
    <h3><span class="icon">🧪</span> Quiz — Question ${quizIndex+1} of ${total}</h3>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem">
      <div style="font-size:20px;font-weight:600;color:var(--purple)">${quizIndex+1}/${total}</div>
      <div class="fc-dots">${dots}</div>
    </div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">${optsHtml}</div>
    ${feedbackHtml}
  </div>`;
}

function answerQuiz(i) {
  if (quizAnswered) return;
  selectedOpt = i;
  quizAnswered = true;
  quizScores.push(LECTURES[currentLec].quiz[quizIndex].ans === i);
  renderTab();
}
function nextQuestion() { quizIndex++; quizAnswered = false; selectedOpt = -1; renderTab(); }
function restartQuiz() { quizIndex = 0; quizAnswered = false; quizScores = []; selectedOpt = -1; renderTab(); }

function renderExam() {
  const d = LECTURES[currentLec];
  const tips = d.examTips.map(t => {
    const badge = t.level === 'high'
      ? '<span class="priority-badge priority-high">High priority</span>'
      : '<span class="priority-badge priority-med">Medium</span>';
    return `<div class="tip-item">${badge} ${t.tip}</div>`;
  }).join('');
  return `<div class="card">
    <h3><span class="icon">⭐</span> Exam Tips — Lecture ${currentLec}: ${d.title}</h3>
    ${tips}
  </div>`;
}

function renderMock() {
  const html = `
  <div class="mock-intro">
    <h3>📝 Full Mock Exam Generator</h3>
    <p>Select which lectures to include in your mock exam, then click Generate. The mock exam will include MCQ questions drawn from all selected lectures — just like your real exam.</p>
    <div class="lec-select-grid">
      ${[1,2,3,4,5,6].map(n => `
        <label class="lec-check">
          <input type="checkbox" id="mock-lec-${n}" checked>
          Lecture ${n}
        </label>`).join('')}
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px" onclick="startMockExam()">Generate Mock Exam →</button>
  </div>`;
  document.getElementById('main-content').innerHTML = html;
}

function startMockExam() {
  const selected = [1,2,3,4,5,6].filter(n => document.getElementById('mock-lec-' + n)?.checked);
  if (selected.length === 0) { alert('Please select at least one lecture.'); return; }

  let allQ = [];
  selected.forEach(n => {
    LECTURES[n].quiz.forEach(q => allQ.push({ ...q, lecNum: n }));
  });
  allQ = allQ.sort(() => Math.random() - 0.5);

  window._mockQ = allQ;
  window._mockIdx = 0;
  window._mockScores = [];
  window._mockAnswered = false;
  window._mockSelectedOpt = -1;
  renderMockExam();
}

function renderMockExam() {
  const qs = window._mockQ;
  const idx = window._mockIdx;
  const total = qs.length;
  const correct = window._mockScores.filter(Boolean).length;

  if (idx >= total) {
    const pct = Math.round(correct / total * 100);
    const msg = pct >= 80 ? '🎉 Excellent result! You are well prepared.' : pct >= 60 ? '👍 Good effort! Review your weak areas.' : '📚 More practice needed — go back to individual lectures.';
    document.getElementById('main-content').innerHTML = `
    <div class="card">
      <h3><span class="icon">📝</span> Mock Exam Complete</h3>
      <div class="quiz-complete">
        <div class="score-big">${pct}%</div>
        <div class="score-label">${correct} out of ${total} correct</div>
        <div class="score-msg">${msg}</div>
        <div style="margin-top:1.5rem;display:flex;gap:8px;justify-content:center">
          <button class="btn" onclick="selectLec('mock',null)">↺ New Mock Exam</button>
        </div>
      </div>
    </div>`;
    return;
  }

  const q = qs[idx];
  let optsHtml = q.opts.map((opt, i) => {
    let cls = '';
    if (window._mockAnswered) {
      if (i === q.ans) cls = 'correct';
      else if (i === window._mockSelectedOpt && i !== q.ans) cls = 'wrong';
    }
    return `<button class="quiz-opt ${cls}" onclick="answerMock(${i})" ${window._mockAnswered?'disabled':''}><strong>${String.fromCharCode(65+i)}.</strong> ${opt}</button>`;
  }).join('');

  let feedbackHtml = '';
  if (window._mockAnswered) {
    const ok = window._mockSelectedOpt === q.ans;
    feedbackHtml = `<div class="quiz-feedback show ${ok?'ok':'no'}">${ok?'✓ Correct! ':'✗ Incorrect. '}<strong>${q.exp}</strong></div>
    <button class="btn btn-primary" onclick="nextMock()">Next →</button>`;
  }

  const dots = qs.map((_, i) => {
    const cls = i < window._mockScores.length ? (window._mockScores[i] ? 'background:#639922' : 'background:#E24B4A') : i === idx ? 'background:var(--purple)' : '';
    return `<div class="dot" style="width:7px;height:7px;${cls}"></div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <h3><span class="icon">📝</span> Mock Exam — Q${idx+1} of ${total} <span style="font-size:12px;color:var(--text3);font-weight:400;margin-left:8px">Lec ${q.lecNum}</span></h3>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem">
      <div style="font-size:20px;font-weight:600;color:var(--purple)">${idx+1}/${total}</div>
      <div class="fc-dots">${dots}</div>
      <div style="margin-left:auto;font-size:13px;color:var(--text2)">Score: ${correct}/${idx}</div>
    </div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">${optsHtml}</div>
    ${feedbackHtml}
  </div>`;
}

function answerMock(i) {
  if (window._mockAnswered) return;
  window._mockSelectedOpt = i;
  window._mockAnswered = true;
  window._mockScores.push(window._mockQ[window._mockIdx].ans === i);
  renderMockExam();
}
function nextMock() {
  window._mockIdx++;
  window._mockAnswered = false;
  window._mockSelectedOpt = -1;
  renderMockExam();
}

// Init
renderMain();

// ── MOBILE FUNCTIONS ──────────────────────────────────────────
function openDrawer() {
  document.getElementById('mob-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('mob-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}
function mobSelectLec(n) {
  closeDrawer();
  // update drawer active state
  document.querySelectorAll('.mob-lec-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('mob-item-' + n);
  if (item) item.classList.add('active');
  // update desktop sidebar too
  document.querySelectorAll('.lec-btn').forEach(b => b.classList.remove('active'));
  const sideBtn = document.querySelectorAll('.lec-btn')[n - 1];
  if (sideBtn) sideBtn.classList.add('active');
  currentLec = n;
  fcIndex = 0; fcRevealed = false;
  quizIndex = 0; quizAnswered = false; quizScores = []; selectedOpt = -1;
  currentTab = 'summary';
  updateMobNav('summary');
  renderMain();
}
function mobTab(tab) {
  if (currentLec === 'mock') { mobMock(); return; }
  currentTab = tab;
  updateMobNav(tab);
  renderMain();
  window.scrollTo(0, 0);
}
function mobMock() {
  document.querySelectorAll('.lec-btn').forEach(b => b.classList.remove('active'));
  currentLec = 'mock';
  updateMobNav('mock');
  renderMain();
  window.scrollTo(0, 0);
}
function updateMobNav(active) {
  const map = { summary: 'mob-btn-sum', flashcards: 'mob-btn-fc', quiz: 'mob-btn-qz', mock: 'mob-btn-mock' };
  document.querySelectorAll('.mob-btn').forEach(b => b.classList.remove('active'));
  if (map[active]) document.getElementById(map[active]).classList.add('active');
}
</script>
